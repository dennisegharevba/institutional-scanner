[theme]
base = "dark"
backgroundColor     = "#0a0a0f"
secondaryBackgroundColor = "#111118"
textColor           = "#e8e8f0"
primaryColor        = "#f4b942"
font                = "sans serif"

[server]
headless        = true
enableCORS      = false
enableXsrfProtection = false

[browser]
gatherUsageStats = false
